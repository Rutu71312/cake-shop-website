<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cake Shop</title>

    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./cart.css">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
</head>

<body style="background-color: rgb(247, 234, 234);">

    <!-- 🧁 PRODUCTS SECTION -->
    <section class="product" id="productContainer"> 
        <div class="heading">
            <h2>Our Exclusive Products</h2>

            <!-- Cart icon -->
            <i class="fas fa-shopping-cart icon" id="cart-btn">
                <span id="cart-count">0</span>
            </i>
        </div>

        <!-- ✅ Products will come from JS -->
        <div class="product-row"></div>
    </section>


    <!-- 🛒 CART SECTION -->
    <div class="cartTab">

        <h1>Shopping Cart</h1>

        <!-- ✅ Cart items will be added dynamically -->
        <div class="listCart"></div>

        
        <div class="btn">
            <button class="close">CLOSE</button>
            <button class="checkOut" onclick="checkout()">CHECK OUT</button>
        </div>

    </div>


    <!-- JS -->
    <script src="./cart.js"></script>

</body>
</html>
