<body>
    <div class="container">
      <div class="form-box">
        <h1 id="title">Sign up</h1>
        <form id="form" action="./php/signup.php" method="POST">
               <div class="input-group">
                   <div class="input-field" id="nameField">
                      <i class="fa-solid fa-user"></i>
                      <input type="text" name="name" placeholder="Name" id="nameInput" required>
                   </div>
  
                   <div class="input-field">
                      <i class="fa-solid fa-envelope"></i>
                      <input type="email" name="email" placeholder="Email" id="emailInput" required>
                   </div>
  
                   <div class="input-field">
                    <i class="fa-solid fa-user"></i>
                    <input type="password" name="password" placeholder="Password" id="passwordInput" required>
                   </div>
                   <p>Forgot password? <a href="#">Click Here!</a></p>
               </div>
               <div class="btn-field">
                   <button type="submit" id="signupBtn">Sign up</button>
                   <button type="button" id="signinBtn" class="disable">Sign in</button>
               </div>
        </form>
      </div> 
    </div>

    <script src="./login.js"></script>
</body>
</html>
